<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      Apply the saved theme before first paint to avoid a flash. Light is the
      default; only a stored "dark" choice adds the class.
    -->
    <script>
      try {
        if (localStorage.getItem("raffall.theme") === "dark") {
          document.documentElement.classList.add("dark");
        }
      } catch (e) {}
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#09090b" />
    <meta
      name="description"
      content="Raffall — Host prize competitions, sell tickets, and run fully-automated, escrow-protected draws."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!--
      Loaded as a non-blocking preload instead of a plain stylesheet link:
      a render-blocking <link rel="stylesheet"> to a third-party origin
      stalls the entire page (including first paint) for as long as that
      connection takes to resolve or fail. Swapping the rel to "stylesheet"
      only once the request settles means a slow or blocked fonts.googleapis.com
      degrades to the fallback font instead of hanging the page.
    -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      />
    </noscript>
    <title>Raffall — Premium Raffle Marketplace</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
